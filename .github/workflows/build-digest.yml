name: AI Daily Digest

on:
  schedule:
    # Morning digest: 22:00 UTC (~ 7am JST / 5pm ET)
    - cron: "0 22 * * *"
    # Evening digest: 11:00 UTC (~ 8pm JST / 6am ET)
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      time_of_day:
        description: "morning or evening"
        type: choice
        options: [morning, evening]
        default: morning

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: data-pipeline
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml pydantic

      - name: Determine time of day
        id: tod
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tod=${{ inputs.time_of_day }}" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%H)" = "22" ]; then
            echo "tod=morning" >> "$GITHUB_OUTPUT"
          else
            echo "tod=evening" >> "$GITHUB_OUTPUT"
          fi

      - name: Build digest
        working-directory: data-pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -m api.build_digest \
            --feed output/intel-latest.json \
            --out output/digest-latest.json \
            --time-of-day "${{ steps.tod.outputs.tod }}"

      - name: Commit and push
        run: |
          git config user.name "rzt-bot"
          git config user.email "rzt-bot@users.noreply.github.com"
          git add data-pipeline/output/digest-latest.json || true
          git diff --cached --quiet || git commit -m "chore: refresh daily digest [skip ci]"
          git push || true
