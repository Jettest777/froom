name: AI Daily Digest

on:
  schedule:
    # Morning digest: 22:00 UTC (~ 7am JST)
    - cron: "0 22 * * *"
    # Evening digest: 11:00 UTC (~ 8pm JST)
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      time_of_day:
        description: "morning or evening"
        type: choice
        options: [morning, evening]
        default: morning
      model:
        description: "Model (haiku is much cheaper)"
        type: choice
        options:
          - "claude-haiku-4-5-20251001"
          - "claude-sonnet-4-5"
        default: "claude-haiku-4-5-20251001"
      force:
        description: "Force regenerate even if cached"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: data-pipeline
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml pydantic beautifulsoup4 lxml

      - name: Determine time of day
        id: tod
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tod=${{ inputs.time_of_day }}" >> "$GITHUB_OUTPUT"
          elif [ "$(date -u +%H)" = "22" ]; then
            echo "tod=morning" >> "$GITHUB_OUTPUT"
          else
            echo "tod=evening" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine model
        id: model
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.model }}" >> "$GITHUB_OUTPUT"
          else
            # Default to Haiku for scheduled runs (cost optimisation)
            echo "name=claude-haiku-4-5-20251001" >> "$GITHUB_OUTPUT"
          fi

      - name: Build feed (RSS + others)
        working-directory: data-pipeline
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          # Provision a minimal config so the feed builder runs.
          if [ ! -f config.yml ]; then
            cp config.example.yml config.yml
            sed -i "s|REPLACE_ME|${X_BEARER_TOKEN:-}|" config.yml
          fi
          python -m api.build_feed --config config.yml --out output/intel-latest.json

      - name: Build digest
        working-directory: data-pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS="--feed output/intel-latest.json --out output/digest-latest.json"
          ARGS="$ARGS --time-of-day ${{ steps.tod.outputs.tod }}"
          ARGS="$ARGS --model ${{ steps.model.outputs.name }}"
          # Manual runs (workflow_dispatch) ALWAYS force a fresh generation so the
          # user never has to remember the toggle. Scheduled runs still respect the
          # cache to keep API cost low.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python -m api.build_digest $ARGS

      - name: Commit and push
        run: |
          git config user.name "rzt-bot"
          git config user.email "rzt-bot@users.noreply.github.com"
          git add data-pipeline/output/intel-latest.json data-pipeline/output/digest-latest.json || true
          git diff --cached --quiet || git commit -m "chore: refresh digest [skip ci]"
          git push || true
