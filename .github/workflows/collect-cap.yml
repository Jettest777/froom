name: Collect Salary Cap Data

on:
  schedule:
    # Cap data changes infrequently; once per day is plenty
    - cron: "30 6 * * *"   # 06:30 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: data-pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape Spotrac
        working-directory: data-pipeline
        env:
          # Polite delay between team requests (seconds)
          SPOTRAC_DELAY: "1.5"
        run: |
          python -m collectors.spotrac_cap --season ${{ vars.CURRENT_SEASON || '2026' }} --out output

      - name: Commit and push cap data
        run: |
          git config user.name "froom-bot"
          git config user.email "froom-bot@users.noreply.github.com"
          git add data-pipeline/output/cap-*.json || true
          git diff --cached --quiet || git commit -m "chore: refresh cap data [skip ci]"
          git push || true
