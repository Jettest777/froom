name: Collect NFL News

on:
  schedule:
    # every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: data-pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Provision config
        working-directory: data-pipeline
        run: |
          cp config.example.yml config.yml
          # Inject secrets via env (these must be set in GitHub Actions secrets)
          sed -i "s|REPLACE_ME|${{ secrets.X_BEARER_TOKEN }}|" config.yml || true

      - name: Build feed
        working-directory: data-pipeline
        run: |
          python -m api.build_feed --config config.yml --out output/intel-latest.json

      - name: Commit and push feed
        run: |
          git config user.name "froom-bot"
          git config user.email "froom-bot@users.noreply.github.com"
          git add data-pipeline/output/intel-latest.json || true
          git diff --cached --quiet || git commit -m "chore: refresh intel feed [skip ci]"
          git push || true
