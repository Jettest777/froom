name: Collect RAS Data

on:
  schedule:
    # RAS data is static per player; refresh weekly
    - cron: "0 4 * * 1"   # Mondays 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: data-pipeline
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Scrape RAS
        working-directory: data-pipeline
        run: |
          python -m collectors.ras_scraper --out output --seed ras-seed.json

      - name: Commit and push
        run: |
          git config user.name "rzt-bot"
          git config user.email "rzt-bot@users.noreply.github.com"
          git add data-pipeline/output/ras-latest.json || true
          git diff --cached --quiet || git commit -m "chore: refresh RAS data [skip ci]"
          git push || true
