name: Collect Rosters

on:
  schedule:
    # Twice a week (Tue & Fri ~14:00 UTC) — rosters change with signings/cuts.
    - cron: "0 14 * * 2,5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rosters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: data-pipeline
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Build rosters (nflverse)
        working-directory: data-pipeline
        run: |
          python -m collectors.roster_collector --out output/rosters-latest.json

      - name: Commit and push
        run: |
          git config user.name "rzt-bot"
          git config user.email "rzt-bot@users.noreply.github.com"
          git add data-pipeline/output/rosters-latest.json || true
          git diff --cached --quiet || git commit -m "chore: refresh rosters [skip ci]"
          git push || true
