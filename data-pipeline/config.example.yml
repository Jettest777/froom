# f/Room data pipeline configuration
# Copy to config.yml and fill in secrets. config.yml is gitignored.

x:
  # X API v2 Bearer Token (read-only is fine)
  # Get yours at https://developer.x.com/en/portal/dashboard
  bearer_token: "REPLACE_ME"

  # Curated list of NFL accounts to monitor.
  # Higher tier = more reliable. We pull recent tweets from all of them.
  watch_accounts:

    # === TIER 1: Top NFL insiders (95%+ reliability) ===
    insiders:
      - AdamSchefter        # ESPN, the #1 source for trades/signings
      - RapSheet            # Ian Rapoport, NFL Network
      - JFowlerESPN         # Jeremy Fowler, ESPN
      - TomPelissero        # NFL Network
      - DBondy              # Diana Russini, The Athletic
      - MikeGarafolo        # NFL Network
      - JaySchroeder        # CBS Sports
      - JosinaAnderson      # Independent

    # === TIER 2: All 32 NFL team official accounts ===
    teams:
      # AFC East
      - BuffaloBills
      - MiamiDolphins
      - Patriots
      - nyjets
      # AFC North
      - Ravens
      - Bengals
      - Browns
      - steelers
      # AFC South
      - HoustonTexans
      - Colts
      - Jaguars
      - Titans
      # AFC West
      - Broncos
      - Chiefs
      - Raiders
      - chargers
      # NFC East
      - dallascowboys
      - Giants
      - Eagles
      - Commanders
      # NFC North
      - ChicagoBears
      - Lions
      - packers
      - Vikings
      # NFC South
      - AtlantaFalcons
      - Panthers
      - Saints
      - Buccaneers
      # NFC West
      - AZCardinals
      - RamsNFL
      - 49ers
      - Seahawks

    # === TIER 3: Beat writers (per-team specialists, 70-85% reliability) ===
    beat_writers:
      - MattMaiocco         # 49ers (NBC Sports Bay Area)
      - calvinwatkins       # Cowboys (Dallas Morning News)
      - MikeReiss           # Patriots (ESPN)
      - JeffHoward11        # Bills
      - NateAtkins_         # Lions (Detroit Free Press)
      - JeremyFowler        # ESPN national
      - JosinaAnderson      # Independent
      - JosephSalvador      # Sports Illustrated
      - PFF                 # Pro Football Focus (analysis-heavy)

# === NFL.com / ESPN web scrapers ===
nfl_official:
  base: "https://www.nfl.com"
  endpoints:
    news: "/news"
    teams: "/teams"

espn:
  base: "https://www.espn.com/nfl"

# === Translation (optional, off by default) ===
translation:
  enabled: false
  provider: deepl    # deepl | google | openai
  api_key: "REPLACE_ME"
  target_lang: ja

# === Reliability scoring ===
reliability:
  # Per-account baseline reliability score (0..1)
  source_weight:
    # Insiders (95%+)
    AdamSchefter: 0.98
    RapSheet: 0.96
    JFowlerESPN: 0.94
    TomPelissero: 0.94
    DBondy: 0.92
    MikeGarafolo: 0.90
    # Team official always 100% for their own news
    official_team: 0.98
    # National outlets
    nfl_com: 0.95
    espn: 0.92
    pff: 0.88
    # Beat writers
    beat_writer: 0.78
    # Unknown sources fallback
    unknown: 0.50
  # Bonus when N distinct sources confirm the same story
  # final_score = min(1.0, base + (n_sources - 1) * bonus)
  multi_source_bonus: 0.04

# === Output ===
output:
  dir: "./output"
  filename: "intel-latest.json"   # iOS app fetches this from GitHub Raw

storage:
  sqlite_path: "./storage/froom.db"
